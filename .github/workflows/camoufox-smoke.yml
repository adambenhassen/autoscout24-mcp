name: camoufox-smoke

# Heavy, live-ish check kept off the per-push path: builds the image and runs a
# real camoufox Connect (launch sidecar + playwright-go driver + navigate). This
# is what catches a Go/python/browser version skew that unit tests can't see.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read
  packages: write

jobs:
  camoufox-connect:
    runs-on: ubuntu-latest
    # A wedged Connect never returns on its own (start() ignores the caller
    # context), so bound the job rather than let it run to GitHub's 6h default.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build smoke image (amd64, reuse the release build cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          target: smoke
          load: true
          tags: autoscout24-mcp:smoke
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          # Refresh the cache too: the release workflow only writes it when a
          # release is cut, so between releases a Dockerfile change would leave
          # this weekly build cold without this.
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
      - name: camoufox connect check
        run: docker run --rm autoscout24-mcp:smoke
