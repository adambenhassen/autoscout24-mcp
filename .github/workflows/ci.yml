name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Vet the build-tagged files too (e2e_test.go, integration_test.go), so a
      # rename/signature break in them is caught here instead of rotting until
      # someone runs the tagged build by hand.
      - run: go vet -tags "e2e integration" ./...
      - run: go test -race ./...

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Builds the binary, boots it with stdin closed + HTTP transport, and
      # drives a real MCP handshake. No live AutoScout24 calls, so no flake.
      # No -run filter: `go test -run X` exits 0 when X matches nothing, so a
      # rename would silently turn this into a green no-op — run every e2e test.
      - run: go test -tags e2e -v .
