name: docker

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Gate the release on a real camoufox Connect from the tagged commit: build
      # the smoke target (which shares every layer with runtime) and run it before
      # pushing, so a version skew or a browser stack that builds but can't launch
      # never ships as :latest. The runtime push below reuses these cached layers.
      - name: Build smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          target: smoke
          load: true
          tags: autoscout24-mcp:smoke
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
      - name: camoufox connect check
        run: docker run --rm autoscout24-mcp:smoke

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
